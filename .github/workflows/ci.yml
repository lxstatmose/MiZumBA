name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: mizumba_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mizumba_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: Backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: Backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Lint with ruff
        working-directory: Backend
        run: python -m ruff check .

      - name: Check formatting with ruff
        working-directory: Backend
        run: python -m ruff format --check .

      - name: Run tests
        working-directory: Backend
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/mizumba_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret-key-for-ci
        run: python -m pytest -v --cov=app --cov-report=term-missing

  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        working-directory: Frontend
        run: npm ci

      - name: Lint with ESLint
        working-directory: Frontend
        run: npm run lint

      - name: Type check with TypeScript
        working-directory: Frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: Frontend
        run: npm run build

      - name: Run tests
        working-directory: Frontend
        run: npm test